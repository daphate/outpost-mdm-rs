server {
    server_name mdm.secondf8n.tech;

    # APK + ML-model uploads can be large; raise the nginx default 1 MB cap.
    client_max_body_size 250M;
    add_header X-Content-Type-Options nosniff always;

    # ---- Grafana under /grafana/ ----------------------------------------
    # Grafana is configured with serve_from_sub_path=true and
    # root_url=https://mdm.secondf8n.tech/grafana/ — pass through with
    # WebSocket upgrade for live-tail panels.
    location /grafana/ {
        # Grafana is started with serve_from_sub_path=true and
        # root_url=https://mdm.secondf8n.tech/grafana/. Forward the full URL
        # (no trailing slash on proxy_pass) so Grafana sees `/grafana/...`.
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- Prometheus under /prometheus/ (read-only) ----------------------
    # Useful for ad-hoc PromQL exploration; production should mostly go
    # through Grafana. Auth via Basic via outpost-server is not wired yet
    # — for now /prometheus/ is open behind admin's own discipline. If
    # you want this gated, add `auth_request /__check_session` after the
    # outpost-server gains a session-check endpoint.
    location /prometheus/ {
        proxy_pass http://127.0.0.1:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- Outpost MDM (everything else) ----------------------------------
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        # Disable response buffering so long-polled /api/v1/sync stays responsive.
        proxy_buffering off;
    }

    # Probes don't need access-log spam.
    location = /healthz { access_log off; proxy_pass http://127.0.0.1:8080; }
    location = /readyz  { access_log off; proxy_pass http://127.0.0.1:8080; }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mdm.secondf8n.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mdm.secondf8n.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = mdm.secondf8n.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name mdm.secondf8n.tech;
    return 404; # managed by Certbot


}
