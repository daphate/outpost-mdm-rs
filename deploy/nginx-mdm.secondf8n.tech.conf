server {
    server_name mdm.secondf8n.tech;

    # APK + ML-model uploads can be large; raise the nginx default 1 MB cap.
    client_max_body_size 250M;
    add_header X-Content-Type-Options nosniff always;

    # =====================================================================
    # v0.18.2: Grafana SSO via MDM auth_request.
    #
    # `/grafana/` is gated by /__mdm_auth_check served by outpost-server.
    # That endpoint reads the `outpost_session` cookie, verifies the
    # session, AND rejects pending-2FA sessions — so the second factor
    # must have completed before Grafana becomes reachable. 401 from the
    # auth handler bounces the browser at the login page with a
    # `redirectTo=/grafana/...` parameter, so we land back here after
    # signing in.
    #
    # Grafana itself is configured with `auth.anonymous = Admin` and
    # `disable_login_form = true`, so it trusts this layer completely —
    # there is no second password screen.
    # =====================================================================

    location = /__mdm_auth_check {
        internal;                       # accessible only via auth_request
        proxy_pass http://127.0.0.1:8080;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location @grafana_login_redirect {
        # Capture the original URI so the user lands back on the
        # Grafana page (or whatever was being accessed) post-login.
        return 303 /login?redirectTo=$request_uri;
    }

    location /grafana/ {
        auth_request /__mdm_auth_check;
        error_page 401 = @grafana_login_redirect;

        # Hand the authenticated user's identity downstream — Grafana
        # can map it into a real account via auth.proxy if we later
        # switch off anonymous mode.
        auth_request_set $auth_user_login $upstream_http_x_auth_user_login;
        auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
        proxy_set_header X-WEBAUTH-USER     $auth_user_login;
        proxy_set_header X-Auth-User-Login  $auth_user_login;
        proxy_set_header X-Auth-User-Id     $auth_user_id;

        # Grafana is started with serve_from_sub_path=true and
        # root_url=https://mdm.secondf8n.tech/grafana/. Forward the full
        # URL (no trailing slash on proxy_pass) so Grafana sees `/grafana/...`.
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- Prometheus under /prometheus/ (read-only) ----------------------
    # Same auth_request as Grafana — admin gating only. Useful for ad-hoc
    # PromQL exploration; production should mostly go through Grafana.
    location /prometheus/ {
        auth_request /__mdm_auth_check;
        error_page 401 = @grafana_login_redirect;

        proxy_pass http://127.0.0.1:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- Outpost MDM (everything else) ----------------------------------
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        # Disable response buffering so long-polled /api/v1/sync stays responsive.
        proxy_buffering off;
    }

    # Probes don't need access-log spam.
    location = /healthz { access_log off; proxy_pass http://127.0.0.1:8080; }
    location = /readyz  { access_log off; proxy_pass http://127.0.0.1:8080; }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mdm.secondf8n.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mdm.secondf8n.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = mdm.secondf8n.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name mdm.secondf8n.tech;
    return 404; # managed by Certbot


}
