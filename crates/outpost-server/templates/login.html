{% extends "base.html" %}

{% block title %}Sign in{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-semibold mb-1">Outpost MDM</h1>
    <p class="text-sm text-slate-500 mb-6">Sign in to manage your fleet.</p>

    {% if let Some(err) = error %}
      <div class="bg-red-50 border border-red-200 text-red-700 px-3 py-2 rounded mb-4 text-sm">
        {{ err }}
      </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-4">
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Login</span>
        <input name="login" type="text" required autofocus autocomplete="username"
               class="mt-1 block w-full rounded border-slate-300 focus:border-blue-500 focus:ring focus:ring-blue-200 px-3 py-2">
      </label>
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Password</span>
        <input name="password" type="password" required autocomplete="current-password"
               class="mt-1 block w-full rounded border-slate-300 focus:border-blue-500 focus:ring focus:ring-blue-200 px-3 py-2">
      </label>
      <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition">
        Sign in
      </button>
    </form>
  </div>
</div>
{% endblock %}
