{% extends "base.html" %}

{% block title %}Two-factor sign in{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-semibold mb-1">Outpost MDM</h1>
    <p class="text-sm text-slate-500 mb-6">Two-factor authentication required.</p>

    {% if let Some(e) = error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2 rounded mb-4">{{ e }}</div>
    {% endif %}

    <form method="POST" action="/login/2fa" class="space-y-4">
      <input type="hidden" name="pending_token" value="{{ pending_token }}">
      <label class="block">
        <span class="text-sm font-medium text-slate-700">6-digit code from your authenticator</span>
        <input name="code" required pattern="[0-9]{6}" maxlength="6" autofocus inputmode="numeric" autocomplete="one-time-code"
               class="mt-1 block w-full rounded border-slate-300 focus:border-blue-500 focus:ring focus:ring-blue-200 px-3 py-2 text-lg font-mono tracking-widest text-center">
      </label>

      <details class="text-xs">
        <summary class="cursor-pointer text-slate-500 hover:text-slate-900">Use a recovery code instead</summary>
        <label class="block mt-2">
          <span class="text-xs uppercase tracking-wide text-slate-500">Recovery code</span>
          <input name="recovery_code" pattern="[a-zA-Z0-9-]+" class="mt-1 block w-full rounded border-slate-300 px-3 py-2 text-sm font-mono">
        </label>
      </details>

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded">
        Verify and sign in
      </button>
    </form>

    <p class="text-xs text-slate-400 mt-4 text-center">
      <a href="/login" class="hover:underline">Cancel and start over</a>
    </p>
  </div>
</div>
{% endblock %}
