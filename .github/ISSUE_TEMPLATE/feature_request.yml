name: Feature request
description: Propose a new capability or change to behaviour.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is awkward / surprising about today's behaviour?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: |
        What would you like to see? Concrete API shape, env var name, or screenshot mockups
        are welcome but not required.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've already tried, and why they fall short.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      options:
        - "Tiny — one endpoint or one config flag"
        - "Medium — new module / new schema migration"
        - "Large — new subsystem / new transport / cross-cutting"
    validations:
      required: true
