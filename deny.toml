[advisories]
# RUSTSEC-2023-0071 — `rsa` crate "Marvin Attack" (timing sidechannel). The `rsa`
# crate is NOT compiled into this server: `cargo tree -i rsa -e all` is empty for
# the deploy target; it appears only in Cargo.lock as a target-gated transitive
# (sqlx here is sqlite-only — no mysql/postgres, which are what pull `rsa`).
# No fixed upstream version exists. Not reachable → not exploitable. Re-evaluate
# if a mysql/postgres sqlx feature is ever enabled.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0", # webpki-roots 1.0.7 — Mozilla CA-cert bundle (data license)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
